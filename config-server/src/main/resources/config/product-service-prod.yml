spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ecommerce_product?createDatabaseIfNotExist=true
    username: root
    password: root

image:
  base:
    url: ${IMAGE_BASE_URL:http://localhost:8080/product-manager/images}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
